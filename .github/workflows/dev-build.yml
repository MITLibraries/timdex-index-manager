name: Dev Image Build and Deploy
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/**'

permissions:
  id-token: write
  contents: read

jobs:

  build-push:
    name: Dev Build and Push
    uses: mitlibraries/.github/.github/workflows/ecr-multi-arch-deploy-dev.yml@main
    secrets: inherit
    with:
      AWS_REGION: us-east-1
      GHA_ROLE: timdex-index-manager-gha-dev
      ECR: timdex-index-manager-dev
